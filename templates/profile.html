<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFit - Athlete Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h2 class="text-2xl font-bold text-blue-500 mb-6 text-center">ATHLETE PROFILE</h2>
        
        <div class="space-y-4">
            <!-- 1. Sport Selection -->
            <!-- Sa profile.html, dagdagan ang options -->
<div>
    <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Varsity Sport</label>
    <select id="sport" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:border-blue-500 outline-none transition">
        <option value="Basketball">Basketball</option>
        <option value="Volleyball">Volleyball</option>
        <option value="Badminton">Badminton</option>
        <option value="Football">Football</option>
    </select>
</div>

            <!-- 2. Physicals (Height/Weight) -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1 font-bold">Height (cm)</label>
                    <input type="number" id="height" placeholder="175" class="w-full p-3 bg-gray-700 rounded border border-gray-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1 font-bold">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70" class="w-full p-3 bg-gray-700 rounded border border-gray-600 outline-none">
                </div>
            </div>

            <!-- 3. Training Focus -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Training Goal</label>
                <select id="goal" class="w-full p-3 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 outline-none transition">
                    <option value="Strength">Increase Strength</option>
                    <option value="Endurance">Improve Endurance</option>
                    <option value="Explosiveness">Explosive Power</option>
                </select>
            </div>

            <!-- 4. Submit Button -->
            <button onclick="saveProfile()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold mt-6 shadow-lg transition-all active:scale-95">
                Complete Setup
            </button>

            <!-- IMPORTANT: Dito lalabas ang "Saving..." text -->
            <p id="profile-message" class="text-center text-sm mt-4 font-medium"></p>
        </div>
    </div>

    <script>
        // Kunin ang UID mula sa Flask context
        const user_id = "{{ uid }}";

        async function saveProfile() {
            const msgElement = document.getElementById('profile-message');
            
            // Kunin ang data mula sa form inputs
            const sport = document.getElementById('sport').value;
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;
            const goal = document.getElementById('goal').value;

            // Simple validation: Wag payagang empty ang height/weight
            if(!height || !weight) {
                msgElement.innerText = "⚠️ Please fill up Height and Weight!";
                msgElement.className = "text-center text-yellow-500 text-sm mt-4";
                return;
            }

            msgElement.innerText = "⏳ Saving your profile... Please wait.";
            msgElement.className = "text-center text-blue-400 text-sm mt-4 font-bold";

            try {
                // I-send ang data sa Python route /update_profile
                const response = await fetch('/update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: user_id,
                        sport: sport,
                        height: height,
                        weight: weight,
                        goal: goal
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    msgElement.innerText = "✅ Success! Redirecting to Dashboard...";
                    msgElement.className = "text-center text-green-500 text-sm mt-4 font-bold";
                    
                    // Lipat na sa Dashboard pagkatapos ng 2 seconds
                    setTimeout(() => {
                        window.location.href = `/dashboard/${user_id}`;
                    }, 2000);
                } else {
                    msgElement.innerText = "❌ Error: " + result.error;
                    msgElement.className = "text-center text-red-500 text-sm mt-4";
                }
            } catch (error) {
                console.error("Fetch error:", error);
                msgElement.innerText = "❌ Connection failed. Check Termux.";
            }
        }
    </script>
</body>
</html>
