<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFit - Varsity Registration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <!-- Main Container -->
    <div class="bg-gray-800 p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-gray-700">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic text-blue-500 tracking-tighter">INTELLIFIT</h1>
            <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest font-bold">SPCBA Varsity System</p>
        </div>

        <div class="space-y-4" id="auth-form">
            <!-- Full Name -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase ml-2 mb-1">Full Name</label>
                <input type="text" id="name" placeholder="Juan Dela Cruz" 
                    class="w-full p-4 bg-gray-700 rounded-2xl border border-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase ml-2 mb-1">SPCBA Email</label>
                <input type="email" id="email" placeholder="juan.delacruz@spcba.edu.ph" 
                    class="w-full p-4 bg-gray-700 rounded-2xl border border-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase ml-2 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full p-4 bg-gray-700 rounded-2xl border border-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            
            <button onclick="handleRegister()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-black text-sm tracking-widest shadow-lg transform active:scale-95 transition-all mt-4 uppercase">
                Sign Up as Varsity
            </button>
        </div>

        <!-- Message Display -->
        <p id="message" class="mt-6 text-center text-xs font-bold min-h-[1.5rem]"></p>
        
        <!-- Footer / Login Link -->
        <div class="mt-8 text-center border-t border-gray-700 pt-6">
            <p class="text-gray-500 text-xs">Already have an account? 
                <a href="/login_page" class="text-blue-500 font-bold hover:underline">Login here</a>
            </p>
        </div>
    </div>

    <!-- Logic Section -->
    <script>
        // 1. AUTO-LOGIN PERSISTENCE: Kung may saved UID na, dideretso sa dashboard
        window.onload = function() {
            const savedUID = localStorage.getItem('intellifit_uid');
            if (savedUID && savedUID !== "None" && savedUID !== "") {
                window.location.href = "/dashboard/" + savedUID;
            }
        };

        // 2. REGISTRATION FUNCTION
        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if(!name || !email || !password) {
                msg.className = "mt-4 text-center text-yellow-500 text-xs font-bold";
                msg.innerText = "⚠️ Please fill in all fields.";
                return;
            }

            msg.className = "mt-4 text-center text-blue-400 text-xs font-bold animate-pulse";
            msg.innerText = "⏳ Creating your account...";

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    msg.className = "mt-4 text-center text-green-500 text-xs font-bold";
                    msg.innerText = "✅ Success! Redirecting to Profile Setup...";

                    // I-save ang UID para sa auto-login mamaya
                    localStorage.setItem('intellifit_uid', result.uid);

                    setTimeout(() => {
                        window.location.href = `/profile/${result.uid}`;
                    }, 2000);
                } else {
                    msg.className = "mt-4 text-center text-red-500 text-xs font-bold";
                    msg.innerText = "❌ " + result.error;
                }
            } catch (error) {
                msg.className = "mt-4 text-center text-red-500 text-xs font-bold";
                msg.innerText = "❌ Connection failed. Is Termux running?";
            }
        }
    </script>
</body>
</html>
