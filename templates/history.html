<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFit - Training History</title>
    <!-- Tailwind CSS - Siguraduhing nandoon ito para hindi lumiit ang icons -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 pb-28 font-sans">

    <!-- 1. HEADER SECTION (Same as Dashboard) -->
    <div class="mb-8 mt-2">
        <h1 class="text-3xl font-black italic uppercase text-blue-500 leading-none">HISTORY</h1>
        <p class="text-gray-500 text-[10px] uppercase font-bold tracking-[0.3em]">Discipline Records</p>
    </div>

    <!-- 2. WORKOUT LOGS LIST -->
    <div class="space-y-4">
        {% if logs %}
            {% for log in logs %}
            <div class="bg-gray-800 p-5 rounded-[2rem] border border-gray-700 shadow-xl flex justify-between items-center transform transition-all active:scale-95">
                <div>
                    <h4 class="font-black text-lg text-white italic tracking-tighter uppercase">{{ log.drill_name }}</h4>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">
                        {{ log.date_formatted }}
                    </p>
                </div>
                <div class="text-right">
                    <span class="bg-green-900/30 text-green-400 text-[9px] px-3 py-1.5 rounded-full font-black border border-green-500/20 uppercase">
                        Completed
                    </span>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <!-- Empty State -->
            <div class="text-center py-20 bg-gray-800/50 rounded-[3rem] border-2 border-dashed border-gray-700">
                <p class="text-4xl mb-4 text-gray-600">🏃‍♂️</p>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">No workouts logged yet.<br>Start your AI session!</p>
            </div>
        {% endif %}
    </div>

    <!-- 3. BOTTOM NAVIGATION BAR (FIXED & FUNCTIONAL) -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-xl p-5 flex justify-around border-t border-gray-800 z-50">
        <!-- HOME LINK -->
        <button onclick="window.location.href='/dashboard/{{ uid }}'" class="text-gray-500 font-black flex flex-col items-center text-[9px] tracking-widest transition-all">
            <span class="text-2xl mb-1">🏠</span>HOME
        </button>

        <!-- HISTORY LINK (Active) -->
        <button onclick="window.location.href='/history/{{ uid }}'" class="text-blue-500 font-black flex flex-col items-center text-[9px] tracking-widest transition-all">
            <span class="text-2xl mb-1">🕒</span>HISTORY
        </button>

        <!-- PROFILE LINK (FIXED) -->
        <button onclick="window.location.href='/profile_view/{{ uid }}'" class="text-gray-500 font-black flex flex-col items-center text-[9px] tracking-widest transition-all">
            <span class="text-2xl mb-1">👤</span>PROFILE
        </button>
    </div>

    <script>
        // persistence check: Siguraduhin na nandoon ang UID
        const currentUID = "{{ uid }}";
        if (currentUID && currentUID !== "None") {
            localStorage.setItem('intellifit_uid', currentUID);
        }
        
        // HINDI natin ilalagay dito yung window.onload redirect 
        // para hindi ka pilitin bumalik sa dashboard.
    </script>
</body>
</html>
