<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 pb-24">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-blue-500">TRAINING HISTORY</h1>
        <p class="text-gray-400 text-sm italic">Tracking your discipline...</p>
    </div>

    <div class="space-y-4">
        {% if logs %}
            {% for log in logs %}
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center">
                <div>
                    <p class="font-bold text-white text-sm">{{ log.drill_name }}</p>
                    <p class="text-[10px] text-gray-500 uppercase">{{ log.timestamp.strftime('%B %d, %Y - %I:%M %p') }}</p>
                </div>
                <span class="bg-green-900/30 text-green-500 text-[10px] px-2 py-1 rounded-full font-bold">COMPLETED</span>
            </div>
            {% endfor %}
        {% else %}
            <div class="text-center py-10">
                <p class="text-gray-600">No workouts logged yet. Start training!</p>
            </div>
        {% endif %}
    </div>

    <!-- Navigation Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-800/90 backdrop-blur-md p-4 flex justify-around border-t border-gray-700">
        <button onclick="window.location.href='/dashboard/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-xs"><span>🏠</span>Home</button>
        <button class="text-blue-500 font-bold flex flex-col items-center text-xs"><span>🕒</span>History</button>
        <button class="text-gray-500 flex flex-col items-center text-xs"><span>👤</span>Profile</button>
    </div>
</body>
</html>
