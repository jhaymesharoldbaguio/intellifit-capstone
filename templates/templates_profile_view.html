<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 pb-24">
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto flex items-center justify-center text-3xl font-bold mb-4 shadow-xl border-4 border-gray-800">
            {{ user.name[0] }}
        </div>
        <h1 class="text-2xl font-bold">{{ user.name }}</h1>
        <p class="text-gray-500 text-sm italic underline">{{ user.email }}</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 gap-4 mb-6 text-center">
        <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-md">
            <p class="text-blue-400 text-2xl font-bold">{{ total }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">Workouts Done</p>
        </div>
        <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-md">
            <p class="text-green-400 text-2xl font-bold">{{ bmi }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">Body Mass Index</p>
        </div>
    </div>

    <!-- Details List -->
    <div class="bg-gray-800 rounded-2xl border border-gray-700 p-4 space-y-4 shadow-lg mb-6">
        <div class="flex justify-between border-b border-gray-700 pb-2">
            <span class="text-gray-400 text-sm">Sport</span>
            <span class="font-bold text-sm">{{ user.sport }}</span>
        </div>
        <div class="flex justify-between border-b border-gray-700 pb-2">
            <span class="text-gray-400 text-sm">Height</span>
            <span class="font-bold text-sm">{{ user.height }} cm</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-400 text-sm">Weight</span>
            <span class="font-bold text-sm">{{ user.weight }} kg</span>
        </div>
    </div>

    <button onclick="window.location.href='/'" class="w-full bg-red-900/30 text-red-500 p-4 rounded-xl font-bold border border-red-900/50">LOGOUT</button>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-800/95 backdrop-blur-md p-4 flex justify-around border-t border-gray-700">
        <button onclick="window.location.href='/dashboard/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-xs"><span>🏠</span>Home</button>
        <button onclick="window.location.href='/history/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-xs"><span>🕒</span>History</button>
        <button class="text-blue-500 font-bold flex flex-col items-center text-xs"><span>👤</span>Profile</button>
    </div>
</body>
</html>
