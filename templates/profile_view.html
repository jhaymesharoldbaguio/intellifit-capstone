<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFit - Athlete Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 pb-28 font-sans">

    <!-- 1. HEADER & AVATAR -->
    <div class="text-center mb-8 mt-4">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full mx-auto flex items-center justify-center text-4xl font-black shadow-xl border-4 border-gray-800 mb-4 uppercase">
            {{ user.name[0] }}
        </div>
        <h1 class="text-2xl font-bold tracking-tight">{{ user.name }}</h1>
        <p class="text-gray-500 text-sm font-medium">{{ user.email }}</p>
    </div>

    <!-- 2. QUICK STATS -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-gray-800 p-5 rounded-3xl border border-gray-700 shadow-lg text-center">
            <p class="text-blue-500 text-3xl font-black mb-1">{{ total }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Workouts Done</p>
        </div>
        <div class="bg-gray-800 p-5 rounded-3xl border border-gray-700 shadow-lg text-center">
            <p class="text-green-500 text-3xl font-black mb-1">{{ bmi }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Body Mass Index</p>
        </div>
    </div>

    <!-- 3. DETAILED ATHLETE INFO -->
    <div class="bg-gray-800 rounded-3xl border border-gray-700 p-6 space-y-6 shadow-xl mb-8">
        <div class="flex justify-between items-center border-b border-gray-700 pb-3">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Physical Information</h3>
            <button onclick="window.location.href='/profile/{{ uid }}'" class="text-blue-500 text-[10px] font-bold border border-blue-500/30 px-2 py-1 rounded-lg uppercase">
                Edit Stats
            </button>
        </div>
        
        <!-- Sport Info -->
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl">🏆</span>
                <span class="text-sm text-gray-400 font-medium">Varsity Sport</span>
            </div>
            <span class="font-bold text-blue-400">{{ user.sport }}</span>
        </div>

        <!-- Height Info -->
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl">📏</span>
                <span class="text-sm text-gray-400 font-medium">Height</span>
            </div>
            <span class="font-bold text-white">{{ user.height }} cm</span>
        </div>

        <!-- Weight Info -->
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl">⚖️</span>
                <span class="text-sm text-gray-400 font-medium">Weight</span>
            </div>
            <span class="font-bold text-white">{{ user.weight }} kg</span>
        </div>
    </div>

    <!-- 4. LOGOUT BUTTON -->
    <button onclick="logout()" class="w-full bg-red-900/20 text-red-500 p-4 rounded-2xl font-bold border border-red-900/30 hover:bg-red-900/40 transition-all active:scale-95 shadow-lg uppercase tracking-widest text-xs">
        Logout Account
    </button>

    <!-- 5. BOTTOM NAVIGATION BAR -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-md p-4 flex justify-around border-t border-gray-800 z-50">
        <button onclick="window.location.href='/dashboard/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-xl mb-1">🏠</span>HOME
        </button>
        <button onclick="window.location.href='/history/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-xl mb-1">🕒</span>HISTORY
        </button>
        <button class="text-blue-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-xl mb-1">👤</span>PROFILE
        </button>
    </div>

    <script>
        // Walang window.onload dito para hindi mag-loop pabalik sa dashboard
        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('intellifit_uid');
                window.location.href = "/login_page";
            }
        }
    </script>
</body>
</html>
