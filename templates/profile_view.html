<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliFit - Athlete Profile</title>
    <!-- Tailwind CSS para sa modernong itsura -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6 pb-28 font-sans">

    <!-- 1. HEADER & AVATAR -->
    <div class="text-center mb-8 mt-4">
        <!-- Automatic Avatar using the first letter of the name -->
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full mx-auto flex items-center justify-center text-4xl font-black shadow-xl border-4 border-gray-800 mb-4">
            {{ user.name[0] | upper }}
        </div>
        <h1 class="text-2xl font-bold tracking-tight">{{ user.name }}</h1>
        <p class="text-gray-500 text-sm font-medium">{{ user.email }}</p>
    </div>

    <!-- 2. QUICK STATS GRID (Health & Activity) -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <!-- Workout Counter -->
        <div class="bg-gray-800 p-5 rounded-3xl border border-gray-700 shadow-lg text-center">
            <p class="text-blue-500 text-3xl font-black mb-1">{{ total }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Workouts Done</p>
        </div>
        <!-- BMI Display -->
        <div class="bg-gray-800 p-5 rounded-3xl border border-gray-700 shadow-lg text-center">
            <p class="text-green-500 text-3xl font-black mb-1">{{ bmi }}</p>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Body Mass Index</p>
        </div>
    </div>

    <!-- 3. DETAILED ATHLETE INFO --><!-- Sa profile_view.html, hanapin ang Physical Information section -->
<!-- Magdagdag ng "Edit" button sa tabi ng title -->
<div class="flex justify-between items-center border-b border-gray-700 pb-3 mb-6">
    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Physical Information</h3>
    <button onclick="window.location.href='/profile/{{ uid }}'" class="text-blue-500 text-[10px] font-bold border border-blue-500/30 px-2 py-1 rounded-lg">
        EDIT STATS
    </button>
</div>


    <!-- 4. LOGOUT BUTTON -->
    <button onclick="logout()" class="w-full bg-red-900/20 text-red-500 p-4 rounded-2xl font-bold border border-red-900/30 hover:bg-red-900/40 transition-all active:scale-95 shadow-lg">
        LOGOUT ACCOUNT
    </button>

    <!-- 5. BOTTOM NAVIGATION BAR -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-md p-4 flex justify-around border-t border-gray-800 z-50">
        <button onclick="window.location.href='/dashboard/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-lg">🏠</span>HOME
        </button>
        <button onclick="window.location.href='/history/{{ uid }}'" class="text-gray-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-lg">🕒</span>HISTORY
        </button>
        <button class="text-blue-500 flex flex-col items-center text-[10px] font-bold">
            <span class="text-lg">👤</span>PROFILE
        </button>
    </div>

    <script>
        function logout() {
            // Sa Capstone, simple redirection lang muna pabalik sa Login/Home
            if(confirm("Are you sure you want to logout?")) {
                window.location.href = "/";
            }
        }
    </script>
</body>
</html>
